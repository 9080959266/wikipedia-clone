<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="left">
            <a href="#">About</a>
            <a href="#">Store</a>
        </div>
        <div class="right">
            <a href="#">Gmail</a>
            <a href="#">Images</a>
            <span>☰</span>
            <div class="profile">K</div>
        </div>
    </nav>
    <div class="container">
        <h1 class="logo">
            <span class="blue">G</span>

 <p class="lang">

            <a href="#">தமிழ்</a>

        </p>

    <footer>
        <div class="footer-info">
            <p>India</p>
        </div>
        <div class="left-footer-links">
            <a href="#">Advertising</a>
            <a href="#">Business</a>
            <a href="#">How Search works</a>
        </div>
        <div class="right-footer-links">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
