<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Application</title>
</head>
<body>
    <form action="">
    <h1>College application Form</h1>
    <h3>Annai Colloge of Engineering and Technology</h3>
    <label for="name">Name :</label>
        <input type="text" 
        name="name" id="Name" placeholder="Enter your name">
        <br>
        <label for="dob">Date of Birth:</label>
        <input type="date" name="dob" id="dob">
        <br>
        <label for="gender">Gender :</label>
        <input type="radio" name="gender" value="Male" id="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" value="Female" id="female">
        <label for="female">Female</label>
        <input type="radio" name="gender" value="Other" id="other">
        <label for="other">Other</label>
        <br>
        <label for="mobile-no">Mobile No :</label>
        <input type="tel" name="mobile-no" id="mobile-no" placeholder="Enter your mobile number">
        <br>
        <label for="email">Email :</label>
        <input type="email" name="email" 
        id="email" placeholder="Enter your email">
 <br>
 <label for="permanent-address">Permanent Address :</label>
 <input type="text" name="permanent-address" id="permanent-address" placeholder="Enter your permanent address">
 <br>
 <label for="district">District :</label>
 <input type="text" name="district" id="district" placeholder="Enter your district">
 <br>
 <label for="state">State :</label>
 <input type="text" name=""state" id=""state" placeholder="Enter your state">
 <br>
 <label for=""pincode">Pincode :</label>
<input type="text" name="pincode" id="pincode" maxlength="6" pattern="[0-9]{6}" placeholder="Enter your pincode">
<br>
<label for="father-name">Father's Name :</label>
 <input type="text" name="father-name" id="father-name" placeholder="Enter your father's name">
 <label for="father-occupation">Father's Occupation :</label>
 <input type="text" name="father-occupation" id="father-occupation" placeholder="Enter your father's occupation">
 <label for="father-mobile-no">Father's Mobile No :</label>
 <input type="tel" name="father-mobile-no" id="father-mobile-no" placeholder="Enter your father's mobile number">
 <br>
 <label for="mother-name">mother's Name :</label>
 <input type="text" name="mother-name" id="mother-name" placeholder="Enter your mother's name">
 <label for="mother-occupation">mother's Occupation :</label>
 <input type="text" name="mother-occupation" id="mother-occupation" placeholder="Enter your mother's occupation">
 <label for="mother-mobile-no">mother's Mobile No :</label>
 <input type="tel" name="mother-mobile-no" id="mother-mobile-no" placeholder="Enter your mother's mobile number">
 <br>
 <label for="gaurdian-name">Gaurdian's Name</label>"
 <input type="text" name="gaurdian-name" id="gaurdian-name" placeholder="Enter your gaurdian's name">
 <label for="gaurdian-occupation">Gaurdian's Occupation :</label>
 <input type="text" name="gaurdian-occupation" id="gaurdian-occupation" placeholder="Enter your gaurdian's occupation">
 <label for="gaurdian-mobile-no">Gaurdian's Mobile No :</label>
 <input type="tel" name="gaurdian-mobile-no" id="gaurdian-mobile-no" placeholder="Enter your gaurdian's mobile number">
 <br>
 <label for="board">Board :</label>
 <select name="board" id="board">
    <option value="CBSE">CBSE</option>
    <option value="State">State</option>
 </select>
 <br>
 <label for="10th-grade">10th Grade Percentage :</label>
 <input type="number" name="10th-grade" id="10th-grade" placeholder="Enter your 10th grade percentage" min="0" max="100">
 <br>
 <label for="12th-grade">12th Grade Percentage :</label>
 <input type="number" name="12th-grade" id="12th-grade" placeholder="Enter your 12th grade percentage" min="0" max="100">
 <br>
 <label for="course">Course :</label>
 <select name="course" id="course">
    <option value="B.E">B.E</option>
    <option value="M.E">M.E</option>
    <option value="B.Tech">B.Tech</option>
    <option value="M.Tech">M.Tech</option>
 </select>
 <br>
 <label for="department">Department :</label>
 <select name="department" id="department">
     <option value="CSE">Computer Science and Engineering</option>
     <option value="IT">Information Technology</option>
     <option value="ECE">Electronics and Communication Engineering</option>
     <option value="ME">Mechanical Engineering</option>
 </select>
 <br>
 <label for="passport-photo">Passport Photo :</label>
 <input type="file" name="passport-photo" id="passport-photo">
 <br>                                           
 <label>
 <input type="checkbox" name="conform" id="conform" required>
 I declare the above information is true
 </label>
 <br>
 <input type="submit" 
        value="Submit">
    </form>
</body>
</html>
