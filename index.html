<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Wikipedia</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Logo Section -->
        <div class="logo-section">
    <h1>Wikipedia</h1>
    <p>The Free Encyclopedia</p>
</div>
 <div class="languages-container">

    <div class="left-languages">
        <div class="language">English</div>
        <div class="language">தமிழ்</div>
        <div class="language">Deutsch</div>
        <div class="language">Français</div>
    </div>

    <div class="image-section">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/63/Wikipedia-logo.png"
             alt="Wikipedia Logo">
    </div>

    <div class="right-languages">
        <div class="language">Español</div>
        <div class="language">Italiano</div>
        <div class="language">Русский</div>
        <div class="language">中文</div>
    </div>

</div>
 
<!--search Bar -->
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search Wikipedia">
<button onclick="searchWikipedia()">Search</button>
        </div>
<!-- Read in Your Language -->
        <div class="language-button">
            <button>Read Wikipedia in your language</button>
        </div>

</div>
 <!-- Footer -->
        <footer>
            <p>Wikipedia is hosted by the Wikimedia Foundation.</p>
        </footer>
       </div>
       <script src="script.js"></script>
</body>
</html>
